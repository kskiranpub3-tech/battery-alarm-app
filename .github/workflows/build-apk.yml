name: Build Battery Alarm APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Scaffold a fresh Flutter project
        run: flutter create --org com.example battery_alarm_app

      - name: Overlay our source files
        run: |
          cp src/pubspec.yaml battery_alarm_app/pubspec.yaml
          cp src/lib/main.dart battery_alarm_app/lib/main.dart
          cp src/lib/battery_monitor_service.dart battery_alarm_app/lib/battery_monitor_service.dart
          cp src/lib/battery_info.dart battery_alarm_app/lib/battery_info.dart
          mkdir -p battery_alarm_app/assets
          cp src/assets/alarm.wav battery_alarm_app/assets/alarm.wav
          # Overlay the native MainActivity (adds the battery_info channel).
          cp src/android/MainActivity.kt \
            battery_alarm_app/android/app/src/main/kotlin/com/example/battery_alarm_app/MainActivity.kt

      - name: Patch AndroidManifest.xml with required permissions
        run: |
          python3 scripts/patch_manifest.py battery_alarm_app/android/app/src/main/AndroidManifest.xml

      - name: Bump minSdk to 23 and compileSdk to 35
        run: |
          # Works for both Groovy (build.gradle) and Kotlin DSL (build.gradle.kts)
          sed -i 's/flutter.minSdkVersion/23/g' battery_alarm_app/android/app/build.gradle* || true
          # audioplayers requires compiling against Android SDK 35
          sed -i 's/flutter.compileSdkVersion/35/g' battery_alarm_app/android/app/build.gradle* || true

      - name: Bump Kotlin to 1.9.24 (ads plugin needs >= 1.9)
        run: |
          cd battery_alarm_app/android
          # Newer template: declarative plugins block in settings.gradle (Groovy)
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' settings.gradle 2>/dev/null || true
          # Kotlin DSL variant
          sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "1.9.24"/' settings.gradle.kts 2>/dev/null || true
          # Legacy template: ext.kotlin_version in build.gradle
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.24'/" build.gradle 2>/dev/null || true
          echo "--- settings.gradle (if present) ---"; cat settings.gradle 2>/dev/null | grep -i kotlin || true

      - name: Get dependencies
        working-directory: battery_alarm_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: battery_alarm_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: battery-alarm-apk
          path: battery_alarm_app/build/app/outputs/flutter-apk/app-debug.apk
