name: battery_alarm_app
description: Adaptive battery alarm — alerts you to unplug at a high % and charge at a low %, with quiet hours and volume control.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  battery_plus: ^6.0.2
  flutter_local_notifications: ^17.2.2
  flutter_background_service: ^5.0.10
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
